name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
      - name: Enable basePath for GitHub Pages
        run: |
          node -e "
          const fs = require('fs');
          let config = fs.readFileSync('next.config.mjs', 'utf8');
          config = config.replace('// basePath: \'/michael-crowley\',', 'basePath: \'/michael-crowley\',');
          config = config.replace('// assetPrefix: \'/michael-crowley/\',', 'assetPrefix: \'/michael-crowley/\',');
          fs.writeFileSync('next.config.mjs', config);
          "
      - name: Install dependencies
        run: npm install
      - name: Build static site
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
